name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.13 resolves the last Python 3.13-compatible HA (floor era);
        # 3.14 resolves the latest HA, which most users now run.
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_test.txt

      - name: Compile integration code
        run: python -m compileall custom_components/eon_next

      - name: Static type check
        run: basedpyright -p pyrightconfig.json

      - name: Run unit and integration tests
        run: pytest -q
